<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inventori Barang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script>
        // === 1. KUNCI PROTEKSI HALAMAN (Wajib ditaruh paling atas) ===
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        // Fungsi untuk keluar sistem
        function logout() {
            localStorage.clear(); // Hapus data login
            window.location.href = 'login.html'; // Lempar kembali ke login
        }
        // ==============================================================
    </script>
</head>

<body class="bg-light">

    <div class="container my-5">
        <div class="text-center mb-4">
            <h2 class="mb-2">Sistem Manajemen Inventori Barang</h2>
            <button onclick="logout()" class="btn btn-danger btn-sm shadow-sm">🚪 Keluar (Logout)</button>
        </div>

        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="card-title mb-0" id="formTitle">Tambah Barang Baru</h5>
                    </div>
                    <div class="card-body">
                        <form id="barangForm">
                            <input type="hidden" id="barangId">
                            <div class="mb-3">
                                <label class="form-label">Nama Barang</label>
                                <input type="text" id="nama" class="form-control" required placeholder="Contoh: Laptop ASUS">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Kategori</label>
                                <select id="kategori" class="form-select" required>
                                    <option value="" disabled selected>-- Pilih Kategori --</option>
                                    <option value="Elektronik">Elektronik</option>
                                    <option value="Furnitur">Furnitur</option>
                                    <option value="Pakaian">Pakaian</option>
                                    <option value="Makanan & Minuman">Makanan & Minuman</option>
                                    <option value="Alat Tulis">Alat Tulis</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Stok Awal</label>
                                <input type="number" id="stok" class="form-control" required min="0" value="0">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Harga (Rp)</label>
                                <input type="number" id="harga" class="form-control" required min="0" placeholder="Contoh: 50000">
                            </div>
                            <button type="submit" class="btn btn-success w-100" id="submitBtn">Simpan Barang</button>
                            <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="cancelBtn" onclick="resetForm()">Batal Edit</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="mb-3 d-flex gap-2">
                    <div class="input-group shadow-sm">
                        <span class="input-group-text bg-white">🔍</span>
                        <input type="text" id="searchInput" class="form-control" placeholder="Cari nama barang atau kategori..." onkeyup="searchBarang()">
                    </div>
                    <a href="cetak.html" target="_blank" class="btn btn-secondary shadow-sm px-4">🖨️ Cetak</a>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h5 class="card-title mb-0">Daftar Stok Gudang</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-striped table-hover align-middle" id="barangTable">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nama Barang</th>
                                        <th>Kategori</th>
                                        <th style="min-width: 130px;">Stok</th>
                                        <th>Harga</th>
                                        <th>Aksi</th>
                                    </tr>
                                </thead>
                                <tbody id="barangTableBody">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/barang';

        document.addEventListener('DOMContentLoaded', fetchBarang);

        // 1. READ: Menampilkan Data ke Tabel
        async function fetchBarang() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const tbody = document.getElementById('barangTableBody');
                tbody.innerHTML = '';

                data.forEach(barang => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${barang.id}</td>
                            <td><strong>${barang.nama_barang}</strong></td>
                            <td><span class="badge bg-info text-dark">${barang.kategori}</span></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <button class="btn btn-outline-danger btn-sm px-2" onclick="ubahStokCepat(${barang.id}, ${barang.stok}, -1)">-</button>
                                    <span class="fw-bold">${barang.stok}</span>
                                    <button class="btn btn-outline-success btn-sm px-2" onclick="ubahStokCepat(${barang.id}, ${barang.stok}, 1)">+</button>
                                </div>
                            </td>
                            <td>Rp ${parseFloat(barang.harga).toLocaleString('id-ID')}</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="editBarang(${barang.id}, '${barang.nama_barang}', '${barang.kategori}', ${barang.stok}, ${barang.harga})">Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteBarang(${barang.id})">Hapus</button>
                            </td>
                        </tr>
                    `;
                });

                searchBarang();
            } catch (error) {
                console.error('Gagal mengambil data:', error);
            }
        }

        // Fungsi Filter Pencarian di Sisi Client (Real-time)
        function searchBarang() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const table = document.getElementById('barangTable');
            const tr = table.getElementsByTagName('tr');

            for (let i = 1; i < tr.length; i++) {
                const tdNama = tr[i].getElementsByTagName('td')[1];
                const tdKategori = tr[i].getElementsByTagName('td')[2];

                if (tdNama || tdKategori) {
                    const txtNama = tdNama.textContent || tdNama.innerText;
                    const txtKategori = tdKategori.textContent || tdKategori.innerText;

                    if (txtNama.toLowerCase().indexOf(input) > -1 || txtKategori.toLowerCase().indexOf(input) > -1) {
                        tr[i].style.display = "";
                    } else {
                        tr[i].style.display = "none";
                    }
                }
            }
        }

        // Mengubah Stok secara Cepat (+1 / -1)
        async function ubahStokCepat(id, stokSaatIni, perubahan) {
            const stokBaru = stokSaatIni + perubahan;

            if (stokBaru < 0) {
                alert('Stok tidak boleh kurang dari 0!');
                return;
            }

            try {
                const resBarang = await fetch(`${API_URL}/${id}`);
                const barang = await resBarang.json();

                const payload = {
                    nama_barang: barang.nama_barang,
                    kategori: barang.kategori,
                    stok: stokBaru,
                    harga: barang.harga
                };

                const response = await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    fetchBarang();
                }
            } catch (error) {
                console.error('Gagal mengubah stok cepat:', error);
            }
        }

        // 2. CREATE & UPDATE: Simpan data dari Form
        document.getElementById('barangForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('barangId').value;
            const payload = {
                nama_barang: document.getElementById('nama').value,
                kategori: document.getElementById('kategori').value,
                stok: parseInt(document.getElementById('stok').value),
                harga: parseFloat(document.getElementById('harga').value)
            };

            const url = id ? `${API_URL}/${id}` : API_URL;
            const method = id ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    resetForm();
                    fetchBarang();
                }
            } catch (error) {
                console.error('Gagal menyimpan data:', error);
            }
        });

        // 3. DELETE: Menghapus Barang
        async function deleteBarang(id) {
            if (confirm('Apakah Anda yakin ingin menghapus barang ini?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        fetchBarang();
                    }
                } catch (error) {
                    console.error('Gagal menghapus data:', error);
                }
            }
        }

        // Fungsi pembantu Edit
        function editBarang(id, nama, kategori, stok, harga) {
            document.getElementById('barangId').value = id;
            document.getElementById('nama').value = nama;
            document.getElementById('kategori').value = kategori;
            document.getElementById('stok').value = stok;
            document.getElementById('harga').value = harga;

            document.getElementById('formTitle').innerText = 'Edit Data Barang';
            document.getElementById('submitBtn').innerText = 'Perbarui Barang';
            document.getElementById('submitBtn').className = 'btn btn-warning w-100';
            document.getElementById('cancelBtn').classList.remove('d-none');
        }

        // Fungsi Reset Form kembali ke kondisi awal
        void function resetForm() {
            document.getElementById('barangForm').reset();
            document.getElementById('barangId').value = '';
            document.getElementById('formTitle').innerText = 'Tambah Barang Baru';
            document.getElementById('submitBtn').innerText = 'Simpan Barang';
            document.getElementById('submitBtn').className = 'btn btn-success w-100';
            document.getElementById('cancelBtn').classList.add('d-none');
        }()
    </script>
</body>

</html>
