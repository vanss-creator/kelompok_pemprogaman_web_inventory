<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Laporan Inventori</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Sembunyikan tombol cetak saat kertas/PDF dicetak */
        @media print {
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-white p-4">

    <div class="container">
        <div class="text-center mb-4">
            <h2>LAPORAN STOK GUDANG</h2>
            <p class="text-muted">Sistem Manajemen Inventori Barang</p>
            <hr>
        </div>

        <button onclick="window.print()" class="btn btn-primary no-print mb-3">🖨️ Klik Cetak / Simpan PDF</button>

        <table class="table table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nama Barang</th>
                    <th>Kategori</th>
                    <th>Stok</th>
                    <th>Harga</th>
                </tr>
            </thead>
            <tbody id="cetakTableBody">
                </tbody>
        </table>
    </div>

    <script>
        const API_URL = '/api/barang';

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const tbody = document.getElementById('cetakTableBody');
                tbody.innerHTML = '';

                data.forEach(barang => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${barang.id}</td>
                            <td><strong>${barang.nama_barang}</strong></td>
                            <td>${barang.kategori}</td>
                            <td>${barang.stok}</td>
                            <td>Rp ${parseFloat(barang.harga).toLocaleString('id-ID')}</td>
                        </tr>
                    `;
                });

                // Otomatis buka dialog cetak bawaan browser setelah data beres dimuat
                setTimeout(() => { window.print(); }, 500);

            } catch (error) {
                console.error('Gagal memuat data cetak:', error);
            }
        });
    </script>
</body>
</html>
